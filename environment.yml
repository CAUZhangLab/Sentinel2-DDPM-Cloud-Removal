name: sentinel2-ddpm-cloud-removal

channels:
  - pytorch
  - conda-forge

dependencies:
  - python=3.10
  - pip>=23
  - "numpy>=1.24,<3.0"
  - "pytorch>=2.0,<3.0"
  - "torchvision>=0.15,<1.0"
  - "tqdm>=4.65,<5.0"
